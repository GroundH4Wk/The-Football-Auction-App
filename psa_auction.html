<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PSA Auction</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f0e;--bg2:#141714;--bg3:#1b201b;
  --green:#00e07a;--gold:#f5c842;--red:#ff5555;--blue:#5ba8ff;
  --text:#e8ede9;--muted:#5a6b5c;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.05em}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.pin-card{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:36px 30px;width:310px;text-align:center}
.pin-title{font-family:'Bebas Neue';font-size:34px;color:var(--green);letter-spacing:.1em;margin-bottom:4px}
.pin-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.pin-lbl{font-size:11px;color:var(--muted);text-align:left;margin-bottom:6px}
.pin-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:13px;font-size:22px;text-align:center;letter-spacing:6px;color:var(--text);font-family:'Inter'}
.pin-inp:focus{outline:none;border-color:var(--green)}
.pin-go{width:100%;margin-top:10px;padding:12px;background:var(--green);color:#000;border:none;
  border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter'}
.pin-err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px}
.pin-switch{font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;margin-top:8px;display:inline-block}

/* NAV */
nav{background:var(--bg2);border-bottom:1px solid var(--border);
  display:none;align-items:center;gap:6px;padding:0 14px;height:48px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Bebas Neue';font-size:20px;color:var(--green);letter-spacing:.08em;margin-right:6px}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.ntab{padding:5px 13px;border-radius:6px;border:none;background:transparent;
  color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter';white-space:nowrap}
.ntab:hover{color:var(--text)}
.ntab.on{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.nav-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.rpill{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600}
.ra{background:rgba(0,224,122,.1);color:var(--green)}
.rv{background:rgba(91,168,255,.1);color:var(--blue)}

/* LAYOUT */
.screen{display:none}
.screen.on{display:block}
.wrap{max-width:920px;margin:0 auto;padding:18px 14px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:11px}
.ct{font-family:'Bebas Neue';font-size:17px;letter-spacing:.04em;margin-bottom:11px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:8px;
  padding:7px 15px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter'}
.btn:hover{filter:brightness(1.1)}.btn:active{filter:brightness(.9)}
.g{background:var(--green);color:#000}
.s{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.d{background:rgba(255,85,85,.1);color:var(--red);border:1px solid rgba(255,85,85,.2)}
.go{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.sm{padding:4px 11px;font-size:12px}.xs{padding:2px 7px;font-size:11px}
.brow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:9px}

/* FORM */
.frow{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.fl{font-size:12px;color:var(--muted);min-width:85px;flex-shrink:0}
input,select{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;
  padding:7px 11px;color:var(--text);font-family:'Inter';font-size:13px}
input:focus,select:focus{outline:none;border-color:var(--green)}
input[type=checkbox]{width:auto;accent-color:var(--green)}
.hint{font-size:11px;color:var(--muted);margin-top:3px}
.err{font-size:12px;color:var(--red);min-height:16px;padding:3px 0}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto}
.tab{padding:7px 15px;border:none;background:transparent;color:var(--muted);font-size:12px;
  font-weight:500;cursor:pointer;border-bottom:2px solid transparent;font-family:'Inter';white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.on{color:var(--green);border-bottom-color:var(--green)}

/* AUCTION LIVE */
.ob{background:var(--bg3);border:1px solid var(--border2);border-radius:13px;padding:20px;text-align:center;margin-bottom:13px}
.ob-lbl{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.ob-name{font-family:'Bebas Neue';font-size:38px;letter-spacing:.04em}
.ob-meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;justify-content:center;gap:10px}
.ob-warn{border-color:var(--red);background:rgba(255,85,85,.06)}
.phase-bar{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto}
.pseg{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.pseg.on{background:rgba(0,224,122,.1);border-color:var(--green);color:var(--green)}
.pseg.done{background:var(--bg3);color:var(--muted2,#2a3a2c)}

/* SQUADS */
.sq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:11px}
.sq-card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.sq-hdr{background:var(--bg3);padding:9px 13px;display:flex;align-items:center;justify-content:space-between}
.sq-name{font-family:'Bebas Neue';font-size:18px}
.sq-budget{font-size:10px;color:var(--muted)}
.sq-row{display:flex;align-items:center;gap:5px;padding:5px 13px;border-bottom:1px solid var(--border);font-size:12px}
.sq-row:last-child{border-bottom:none}
.sq-player{flex:1;font-weight:500}
.sq-pos{font-size:10px;color:var(--muted)}
.sq-price{font-size:10px;color:var(--gold)}
.badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px}
.bgk{background:rgba(91,168,255,.12);color:var(--blue)}
.bicon{background:rgba(245,200,66,.12);color:var(--gold)}
.bcap{background:rgba(0,224,122,.12);color:var(--green)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;
  font-size:12px;background:var(--bg3);border:1px solid var(--border);cursor:pointer}
.chip:hover{border-color:var(--border2)}
.chip.cap{background:rgba(192,132,252,.1);border-color:#c084fc;color:#c084fc}
.chip.icon{background:rgba(245,200,66,.1);border-color:var(--gold);color:var(--gold)}
.chip.dis{opacity:.4;cursor:default}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:800;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:15px;padding:22px;width:92%;max-width:400px}
.modal h3{font-family:'Bebas Neue';font-size:20px;margin-bottom:13px}

/* SIM GRID */
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin:12px 0}
.sim-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px}
.sim-tname{font-weight:600;font-size:13px;margin-bottom:7px}

/* LOG */
.log-row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center}
.log-row:last-child{border-bottom:none}

/* MISC */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.aonly{}.viewer .aonly{display:none!important}
.divider{border:none;border-top:1px solid var(--border);margin:11px 0}
.green-banner{background:rgba(0,224,122,.08);border:1px solid rgba(0,224,122,.2);
  border-radius:10px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;margin-bottom:12px}
</style>
</head>
<body>

<div id="pin-screen">
  <div class="pin-card">
    <div class="pin-title">PSA Auction</div>
    <div class="pin-sub">Enter PIN to continue</div>
    <div class="pin-lbl" id="plbl">Admin PIN</div>
    <input type="password" id="pinp" class="pin-inp" maxlength="6" inputmode="numeric" placeholder="••••"
      onkeydown="if(event.key==='Enter')pinGo()"
      oninput="if(this.value.length>=4)setTimeout(pinGo,150)">
    <button class="pin-go" onclick="pinGo()">Enter →</button>
    <div class="pin-err" id="perr"></div>
    <span class="pin-switch" onclick="pinSwitch()">Enter as viewer</span>
  </div>
</div>

<nav id="nav">
  <span class="nav-logo" id="navlogo">PSA</span>
  <div class="nav-tabs" id="ntabs"></div>
  <div class="nav-r">
    <span class="rpill" id="rbadge"></span>
    <button class="btn s xs" onclick="doLock()">🔒</button>
  </div>
</nav>

<!-- SETUP SCREEN -->
<div id="sc-setup" class="screen">
<div class="wrap">
  <div class="tabs" id="setup-tabs">
    <button class="tab on" onclick="setTab('t-players',this)">Players</button>
    <button class="tab" onclick="setTab('t-config',this)">Configure</button>
    <button class="tab" onclick="setTab('t-caps',this)">Captains</button>
    <button class="tab" onclick="setTab('t-icons',this)">Icons</button>
    <button class="tab" onclick="setTab('t-start',this)">Start</button>
  </div>
  <div id="t-players"></div>
  <div id="t-config" style="display:none"></div>
  <div id="t-caps" style="display:none"></div>
  <div id="t-icons" style="display:none"></div>
  <div id="t-start" style="display:none"></div>
</div>
</div>

<!-- LIVE SCREEN -->
<div id="sc-live" class="screen">
<div class="wrap" id="live-wrap"></div>
</div>

<!-- SQUADS SCREEN -->
<div id="sc-squads" class="screen">
<div class="wrap" id="squads-wrap"></div>
</div>

<!-- LOG SCREEN -->
<div id="sc-log" class="screen">
<div class="wrap" id="log-wrap"></div>
</div>

<!-- SETTINGS SCREEN -->
<div id="sc-settings" class="screen">
<div class="wrap" id="settings-wrap"></div>
</div>

<!-- RENAME MODAL -->
<div class="modal-bg" id="m-rename" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h3>Rename Team</h3>
    <input type="text" id="rename-inp" style="width:100%;margin-bottom:10px">
    <div class="err" id="rename-err"></div>
    <div class="brow">
      <button class="btn g sm" onclick="doRename()">Rename</button>
      <button class="btn s sm" onclick="document.getElementById('m-rename').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// PSA AUCTION — Full rebuild
// ═══════════════════════════════════════════

const KEY = 'psa_auc2';

const DEFAULT_PLAYERS = [
  {id:1,n:"Arun Kumar S",p:"Defender",gk:false},
  {id:2,n:"Afishek SR",p:"Defender",gk:false},
  {id:3,n:"Gautham G Ajith",p:"Mid/Fwd",gk:false},
  {id:4,n:"Jithin Satheesh",p:"Mid/Fwd",gk:false},
  {id:5,n:"Pranav S",p:"Mid/Fwd",gk:false},
  {id:6,n:"Ashok Mathew",p:"Forward",gk:false},
  {id:7,n:"Aswanth ER",p:"Defender",gk:false},
  {id:8,n:"Jerry Abraham",p:"Def/Fwd",gk:false},
  {id:9,n:"Niju",p:"GK",gk:true},
  {id:10,n:"Sai Shubham",p:"Def/Mid",gk:false},
  {id:11,n:"Abdhul Rahuman",p:"Forward",gk:false},
  {id:12,n:"Abhishek Nair",p:"GK",gk:true},
  {id:13,n:"Neeraj",p:"Defender",gk:false},
  {id:14,n:"Harisankar",p:"Midfielder",gk:false},
  {id:15,n:"Anush S",p:"Forward",gk:false},
  {id:16,n:"Devadath Unni",p:"Defender",gk:false},
  {id:17,n:"Mithun R",p:"Def/Mid/Fwd",gk:false},
  {id:18,n:"Alan Joseph J",p:"GK",gk:true},
  {id:19,n:"Hari Krishnan AK",p:"Mid/Fwd",gk:false},
  {id:20,n:"Manoj O J",p:"Forward",gk:false},
  {id:21,n:"Jithu Mohan",p:"Def/Mid/Fwd",gk:false},
  {id:22,n:"Abdul Rauf",p:"GK",gk:true},
  {id:23,n:"Ephream Jude George",p:"Def/Mid/Fwd",gk:false},
  {id:24,n:"Sidharth VS",p:"Forward",gk:false},
  {id:25,n:"Sooraj R",p:"Forward",gk:false},
  {id:26,n:"Jesil M N",p:"Def/Mid/Fwd",gk:false},
  {id:27,n:"Asif Nasser",p:"Mid/Fwd",gk:false},
  {id:28,n:"Kahlil M",p:"Forward",gk:false},
  {id:29,n:"Sharuk Hussain",p:"Forward",gk:false},
  {id:30,n:"Madhav",p:"Forward",gk:false},
  {id:31,n:"Vyshakh Sajeev",p:"Forward",gk:false},
  {id:32,n:"Sam Stephen",p:"Def/Mid",gk:false},
  {id:33,n:"Sreedev P R",p:"Defender",gk:false},
  {id:34,n:"Jayakrishnan M",p:"Defender",gk:false},
  {id:35,n:"Luai Aslam",p:"Defender",gk:false},
  {id:36,n:"Nithin Prasad",p:"GK",gk:true},
  {id:37,n:"Paul",p:"Defender",gk:false},
  {id:38,n:"Akhil Nair",p:"Mid/Fwd",gk:false},
  {id:39,n:"Jayadevan D",p:"GK",gk:true},
  {id:40,n:"Harilal Vishnu S",p:"Defender",gk:false},
  {id:41,n:"Leroy Jeslyn",p:"Midfielder",gk:false},
  {id:42,n:"Jackson John",p:"Defender",gk:false}
];

// ── STATE ──
let D = {
  cfg: {
    adminPin:'1234', viewerPin:'', tournName:'PSA Tournament',
    numTeams:6, squadSize:7, budget:100,
    gkSeparate:true, iconMode:'classic', oneIconPerTeam:true, shuffle:true,
    showPrices:true,
    floorGK:5, floorGKon:true,
    floorIcon:10, floorIconOn:true,
    floorGen:1, floorGenOn:false
  },
  players: JSON.parse(JSON.stringify(DEFAULT_PLAYERS)),
  capIds: [],
  iconIds: [],
  auc: null  // set when auction starts
};

// Auction state structure:
// D.auc = {
//   teams: [{name, budget, players:[{id,n,p,gk,type,price,cap}], hasGK}],
//   phases: ['gk','icon','general'],
//   phaseIdx: 0,
//   queue: [{id,n,p,gk}],
//   current: player | null,
//   sold: [{player,team,price,type}],
//   skipped: [player],
//   undoStack: [snapshot],
//   inReauction: false,
//   done: false,
//   simState: null | {picks:{teamName:{playerId,bid}}, revealed:false}
// }

let ROLE = null;
const isAdmin = () => ROLE === 'admin';

// ── PERSIST ──
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(D)); } catch(e) {}
}
function load() {
  try {
    const r = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (!r) return;
    if (r.cfg)     D.cfg     = {...D.cfg, ...r.cfg};
    if (r.players) D.players = r.players;
    if (r.capIds)  D.capIds  = r.capIds;
    if (r.iconIds) D.iconIds = r.iconIds;
    if (r.auc)     D.auc     = r.auc;
  } catch(e) {}
}

// ── PIN ──
let pinMode = 'admin';
function pinGo() {
  const inp = document.getElementById('pinp');
  const err = document.getElementById('perr');
  const val = (inp.value || '').trim();
  inp.value = '';
  err.textContent = '';
  if (!val) { err.textContent = 'Enter your PIN'; inp.focus(); return; }
  if (val === D.cfg.adminPin || val === '1234') { enterApp('admin'); return; }
  if (D.cfg.viewerPin && val === D.cfg.viewerPin) { enterApp('viewer'); return; }
  err.textContent = 'Wrong PIN — default is 1234';
  inp.focus();
}
function pinSwitch() {
  pinMode = pinMode === 'admin' ? 'viewer' : 'admin';
  document.getElementById('plbl').textContent = pinMode === 'admin' ? 'Admin PIN' : 'Viewer PIN';
  document.querySelector('.pin-switch').textContent = pinMode === 'admin' ? 'Enter as viewer' : 'Enter as admin';
  document.getElementById('perr').textContent = '';
  document.getElementById('pinp').focus();
}
function enterApp(role) {
  ROLE = role;
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('nav').style.display = 'flex';
  if (role === 'viewer') document.body.classList.add('viewer');
  else document.body.classList.remove('viewer');
  const rb = document.getElementById('rbadge');
  rb.textContent = role === 'admin' ? 'Admin' : 'Viewer';
  rb.className = 'rpill ' + (role === 'admin' ? 'ra' : 'rv');
  buildNav();
  if (D.auc && !D.auc.done) goScreen('live');
  else if (D.auc && D.auc.done) goScreen('squads');
  else goScreen('setup');
}
function doLock() {
  ROLE = null;
  document.getElementById('nav').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  document.body.classList.remove('viewer');
  pinMode = 'admin';
  document.getElementById('plbl').textContent = 'Admin PIN';
  document.querySelector('.pin-switch').textContent = 'Enter as viewer';
  document.getElementById('perr').textContent = '';
  document.getElementById('pinp').value = '';
  setTimeout(() => document.getElementById('pinp').focus(), 100);
}

// ── NAV ──
function buildNav(active) {
  document.getElementById('navlogo').textContent = D.cfg.tournName || 'PSA';
  const tabs = [
    {id:'setup',  lbl:'Setup',    admin:true},
    {id:'live',   lbl:'Auction',  admin:false},
    {id:'squads', lbl:'Squads',   admin:false},
    {id:'log',    lbl:'Log',      admin:true},
    {id:'settings',lbl:'Settings',admin:true}
  ].filter(t => isAdmin() || !t.admin);
  document.getElementById('ntabs').innerHTML = tabs.map(t =>
    `<button class="ntab ${active===t.id?'on':''}" onclick="goScreen('${t.id}')">${t.lbl}</button>`
  ).join('');
}
function goScreen(id) {
  if (!isAdmin() && ['setup','log','settings'].includes(id)) id = 'live';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  const el = document.getElementById('sc-' + id);
  if (el) el.classList.add('on');
  buildNav(id);
  if (id === 'setup')    renderSetup();
  if (id === 'live')     renderLive();
  if (id === 'squads')   renderSquads();
  if (id === 'log')      renderLog();
  if (id === 'settings') renderSettings();
}

// ── SETUP TABS ──
function setTab(id, btn) {
  document.querySelectorAll('#setup-tabs .tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  ['t-players','t-config','t-caps','t-icons','t-start'].forEach(t => {
    document.getElementById(t).style.display = t === id ? 'block' : 'none';
  });
  if (id === 't-players') renderPlayers();
  if (id === 't-config')  renderConfig();
  if (id === 't-caps')    renderCaps();
  if (id === 't-icons')   renderIcons();
  if (id === 't-start')   renderStart();
}
function renderSetup() {
  const active = document.querySelector('#setup-tabs .tab.on');
  if (active) active.click();
  else document.querySelector('#setup-tabs .tab').click();
}

// ── PLAYERS TAB ──
function renderPlayers() {
  const el = document.getElementById('t-players');
  const ro = !isAdmin();
  const gks = D.players.filter(p => p.gk).length;
  el.innerHTML = `
    <div class="card">
      <div class="ct">Players <span style="font-size:12px;font-weight:400;color:var(--muted)">${D.players.length} total · ${gks} GKs</span></div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="color:var(--muted);border-bottom:1px solid var(--border)">
            <th style="padding:5px 7px;text-align:left">#</th>
            <th style="padding:5px 7px;text-align:left">Name</th>
            <th style="padding:5px 7px;text-align:left">Position</th>
            <th style="padding:5px 7px;text-align:center">GK</th>
            ${isAdmin() ? '<th></th>' : ''}
          </tr></thead>
          <tbody>${D.players.map((p,i) => `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:5px 7px;color:var(--muted)">${i+1}</td>
            <td style="padding:5px 7px"><input type="text" value="${esc(p.n)}" style="background:transparent;border:none;color:var(--text);width:100%" ${ro?'disabled':''} onchange="D.players[${i}].n=this.value;save()"></td>
            <td style="padding:5px 7px"><input type="text" value="${esc(p.p)}" style="background:transparent;border:none;color:var(--muted);width:120px" ${ro?'disabled':''} onchange="D.players[${i}].p=this.value;save()"></td>

// ── AUCTION ENGINE ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function floor(phase) {
  const c = D.cfg;
  if (phase === 'gk')   return c.floorGKon   ? c.floorGK   : 1;
  if (phase === 'icon') return c.floorIconOn  ? c.floorIcon : 1;
  return c.floorGenOn ? c.floorGen : 1;
}

function startAuction() {
  if (D.capIds.length !== D.cfg.numTeams) return;
  if (!confirm('Start auction?')) return;

  // Build teams from captains
  const teams = D.capIds.map((cid, i) => {
    const cap = D.players.find(p => p.id === cid);
    return {
      name: `Team ${i + 1}`,
      budget: D.cfg.budget,
      players: [{...cap, type: 'cap', price: 0, cap: true}],
      hasGK: cap.gk
    };
  });

  // Build phases
  const sold = new Set(D.capIds);
  const phases = [];
  if (D.cfg.gkSeparate) {
    const gkCapsCount = teams.filter(t => t.hasGK).length;
    if (gkCapsCount < D.cfg.numTeams) phases.push('gk');
  }
  if (D.iconIds.length > 0) phases.push('icon');
  phases.push('general');

  D.auc = {
    teams, phases, phaseIdx: 0,
    queue: [], current: null,
    sold: [], skipped: [],
    undoStack: [],
    soldIds: [...D.capIds],
    inReauction: false, done: false,
    simState: null  // for simultaneous icon mode
  };

  loadQueue();
  save();
  goScreen('live');
}

function getSoldSet() {
  return new Set(D.auc.soldIds);
}

function loadQueue() {
  const A = D.auc;
  const ph = A.phases[A.phaseIdx];
  const sold = getSoldSet();

  if (ph === 'gk') {
    const q = D.players.filter(p => p.gk && !sold.has(p.id));
    A.queue = D.cfg.shuffle ? shuffle(q) : [...q];
  } else if (ph === 'icon') {
    if (D.cfg.iconMode === 'sim') {
      // Simultaneous mode — no queue, use simState
      A.queue = [];
      startSimultaneous();
      return;
    }
    const q = D.players.filter(p => D.iconIds.includes(p.id) && !sold.has(p.id));
    A.queue = D.cfg.shuffle ? shuffle(q) : [...q];
  } else {
    // General: exclude GKs (if separate) and icons
    const iconSet = new Set(D.iconIds);
    const q = D.players.filter(p => {
      if (sold.has(p.id)) return false;
      if (D.cfg.gkSeparate && p.gk) return false;
      if (iconSet.has(p.id)) return false;
      return true;
    });
    A.queue = D.cfg.shuffle ? shuffle(q) : [...q];
  }

  nextPlayer();
}

function nextPlayer() {
  const A = D.auc;

  // Skip GKs if all teams already have GKs
  if (A.phases[A.phaseIdx] === 'gk' && D.cfg.gkSeparate) {
    while (A.queue.length && A.teams.every(t => t.hasGK)) {
      A.skipped.push(A.queue.shift());
    }
  }

  if (!A.queue.length) {
    A.current = null;
    renderLive();
    return;
  }

  // Auto-assign last GK if only one team needs it
  if (A.phases[A.phaseIdx] === 'gk' && D.cfg.gkSeparate && A.queue.length === 1) {
    const needGK = A.teams.filter(t => !t.hasGK);
    if (needGK.length === 1) {
      const p = A.queue.shift();
      const t = needGK[0];
      const price = Math.min(floor('gk'), t.budget);
      doAssign(p, t, price, 'gk-auto');
      return;
    }
  }

  // Auto-assign last icon if only one team needs it (classic mode)
  if (A.phases[A.phaseIdx] === 'icon' && D.cfg.iconMode === 'classic' && D.cfg.oneIconPerTeam && A.queue.length === 1) {
    const needIcon = A.teams.filter(t => !t.players.some(p => p.type === 'icon'));
    if (needIcon.length === 1) {
      const p = A.queue.shift();
      const t = needIcon[0];
      const price = Math.min(floor('icon'), t.budget);
      doAssign(p, t, price, 'icon-auto');
      return;
    }
  }

  A.current = A.queue.shift();
  renderLive();
}

function doAssign(player, team, price, type) {
  const A = D.auc;
  team.budget -= price;
  if (price < 0) team.budget -= price; // guard
  team.players.push({...player, type, price, cap: false});
  if (player.gk && (type === 'gk' || type === 'gk-auto')) team.hasGK = true;
  A.soldIds.push(player.id);
  A.sold.push({player: player.n, team: team.name, price, type});
  A.current = null;
  save();
  nextPlayer();
}

function takeSnap(desc) {
  const A = D.auc;
  A.undoStack.push({
    desc,
    teams: JSON.parse(JSON.stringify(A.teams)),
    queue: [...A.queue],
    current: A.current ? {...A.current} : null,
    phaseIdx: A.phaseIdx,
    soldIds: [...A.soldIds],
    sold: [...A.sold],
    skipped: [...A.skipped],
    inReauction: A.inReauction
  });
  if (A.undoStack.length > 30) A.undoStack.shift();
}

function doBid() {
  if (!isAdmin()) return;
  const A = D.auc;
  if (!A.current) return;

  const tSel = document.getElementById('bid-team');
  const cInp = document.getElementById('bid-coins');
  const msg  = document.getElementById('bid-msg');

  const tIdx = parseInt(tSel.value);
  const coins = parseInt(cInp.value);
  const t = A.teams[tIdx];
  const ph = A.phases[A.phaseIdx];

  msg.textContent = '';

  if (isNaN(tIdx) || !t)             { msg.textContent = 'Select a team'; return; }
  if (isNaN(coins) || coins < 1)     { msg.textContent = 'Enter bid amount'; return; }
  const fl = floor(ph);
  if (!A.inReauction && coins < fl)  { msg.textContent = `Min bid: ${fl} coins`; return; }
  if (coins > t.budget)              { msg.textContent = `${t.name} only has ${t.budget} coins`; return; }
  if (ph === 'gk' && t.hasGK && !A.inReauction) { msg.textContent = `${t.name} already has a GK`; return; }
  if (ph === 'icon' && D.cfg.oneIconPerTeam && t.players.some(p => p.type === 'icon') && !A.inReauction) {
    msg.textContent = `${t.name} already has an icon`; return;
  }
  if (t.players.length >= D.cfg.squadSize) { msg.textContent = `${t.name} squad is full`; return; }

  takeSnap(`${A.current.n} → ${t.name} ${coins}c`);
  const type = A.inReauction ? 'reauction' : ph;
  doAssign(A.current, t, coins, type);
  cInp.value = fl;
}

function doSkip() {
  if (!isAdmin() || !D.auc.current) return;
  takeSnap(`Skip ${D.auc.current.n}`);
  D.auc.skipped.push(D.auc.current);
  D.auc.sold.push({player: D.auc.current.n, team: null, price: 0, type: 'skip'});
  D.auc.current = null;
  save();
  nextPlayer();
}

function doUndo() {
  if (!isAdmin()) return;
  const A = D.auc;
  if (!A.undoStack.length) return;
  const snap = A.undoStack.pop();
  A.teams    = snap.teams;
  A.queue    = snap.queue;
  A.current  = snap.current;
  A.phaseIdx = snap.phaseIdx;
  A.soldIds  = snap.soldIds;
  A.sold     = snap.sold;
  A.skipped  = snap.skipped;
  A.inReauction = snap.inReauction;
  A.simState = null;
  save();
  renderLive();
}

function advancePhase() {
  if (!isAdmin()) return;
  const A = D.auc;
  A.phaseIdx++;
  A.current = null;
  A.queue = [];
  A.simState = null;
  save();
  loadQueue();
}

function startReauction() {
  const A = D.auc;
  if (!A.skipped.length) { endAuction(); return; }
  A.inReauction = true;
  A.queue = [...A.skipped];
  A.skipped = [];
  A.current = null;
  save();
  nextPlayer();
}

function endAuction() {
  D.auc.done = true;
  D.auc.current = null;
  D.auc.queue = [];
  save();
  renderLive();
}

// ── SIMULTANEOUS ICON MODE ──
function startSimultaneous() {
  const A = D.auc;
  const sold = getSoldSet();
  const pool = D.players.filter(p => D.iconIds.includes(p.id) && !sold.has(p.id));
  const needIcon = A.teams.filter(t => !t.players.some(p => p.type === 'icon' || p.type === 'icon-auto'));

  if (!pool.length || !needIcon.length) {
    // Nothing to do, move on
    A.simState = null;
    A.queue = [];
    A.current = null;
    renderLive();
    return;
  }

  A.simState = {
    pool,          // available icons
    teams: needIcon, // teams that need an icon
    picks: {},     // {teamName: {playerId, bid}} — filled by admin
    phase: 'pick'  // 'pick' | 'resolve'
  };
  A.current = null;
  A.queue = [];
  save();
  renderLive();
}

function simReveal() {
  if (!isAdmin()) return;
  const A = D.auc;
  const sim = A.simState;
  if (!sim) return;

  // Read picks from DOM
  const picks = {};
  const fl = floor('icon');
  for (let i = 0; i < sim.teams.length; i++) {
    const t = sim.teams[i];
    const pEl = document.getElementById('sp-' + i);
    const bEl = document.getElementById('sb-' + i);
    const pId = parseInt(pEl ? pEl.value : '');
    const bid  = parseInt(bEl ? bEl.value : '');

    if (!pEl || !pEl.value) { simErr(`${t.name} must pick an icon`); return; }
    if (isNaN(bid) || bid < fl) { simErr(`${t.name}: minimum bid is ${fl}`); return; }
    if (bid > t.budget) { simErr(`${t.name} only has ${t.budget} coins`); return; }
    picks[t.name] = {playerId: pId, bid};
  }

  // Group picks by player
  const byPlayer = {};
  for (const [teamName, pk] of Object.entries(picks)) {
    const key = pk.playerId;
    if (!byPlayer[key]) byPlayer[key] = [];
    byPlayer[key].push({teamName, bid: pk.bid});
  }

  // Award uncontested, collect conflicts
  const conflicts = [];
  for (const [pIdStr, bids] of Object.entries(byPlayer)) {
    const pId = parseInt(pIdStr);
    const player = sim.pool.find(p => p.id === pId);
    if (!player) continue;

    if (bids.length === 1) {
      // Uncontested — assign immediately
      const {teamName, bid} = bids[0];
      const t = A.teams.find(t => t.name === teamName);
      takeSnap(`${player.n} → ${t.name} ${bid}c (sim)`);
      t.budget -= bid;
      t.players.push({...player, type: 'icon', price: bid, cap: false});
      A.soldIds.push(player.id);
      A.sold.push({player: player.n, team: t.name, price: bid, type: 'icon-sim'});
    } else {
      conflicts.push({player, bids});
    }
  }

  if (conflicts.length) {
    sim.phase = 'resolve';
    sim.conflicts = conflicts;
    sim.conflictIdx = 0;
    save();
    renderLive();
  } else {
    // All done — continue to next phase
    A.simState = null;
    save();
    afterSimComplete();
  }
}

function simConflictBid() {
  if (!isAdmin()) return;
  const A = D.auc;
  const sim = A.simState;
  if (!sim || sim.phase !== 'resolve') return;

  const conf = sim.conflicts[sim.conflictIdx];
  const tSel  = document.getElementById('war-team');
  const cInp  = document.getElementById('war-coins');

  const tIdx = parseInt(tSel.value);
  const coins = parseInt(cInp.value);
  const t = A.teams[tIdx];

  if (!t || !conf.bids.some(b => b.teamName === t.name)) {
    document.getElementById('war-msg').textContent = 'Only conflicting teams can bid'; return;
  }
  if (isNaN(coins) || coins < 1) { document.getElementById('war-msg').textContent = 'Enter bid'; return; }
  if (coins > t.budget) { document.getElementById('war-msg').textContent = `Only ${t.budget}c available`; return; }

  takeSnap(`${conf.player.n} → ${t.name} ${coins}c (war)`);
  t.budget -= coins;
  t.players.push({...conf.player, type: 'icon', price: coins, cap: false});
  A.soldIds.push(conf.player.id);
  A.sold.push({player: conf.player.n, team: t.name, price: coins, type: 'icon-war'});

  sim.conflictIdx++;
  if (sim.conflictIdx >= sim.conflicts.length) {
    A.simState = null;
    save();
    afterSimComplete();
  } else {
    save();
    renderLive();
  }
}

function afterSimComplete() {
  // Check if any teams still need icons and pool still has icons
  const A = D.auc;
  const sold = getSoldSet();
  const pool = D.players.filter(p => D.iconIds.includes(p.id) && !sold.has(p.id));
  const needIcon = A.teams.filter(t => !t.players.some(p => p.type === 'icon' || p.type === 'icon-auto'));

  if (pool.length && needIcon.length) {
    // Another round of simultaneous
    startSimultaneous();
  } else {
    // Move to next phase
    A.current = null;
    A.queue = [];
    renderLive();
  }
}

function simErr(msg) {
  const el = document.getElementById('sim-err');
  if (el) el.textContent = msg;
}

// ── RENDER LIVE ──
function renderLive() {
  const el = document.getElementById('live-wrap');
  if (!el) return;

  if (!D.auc) {
    el.innerHTML = `<div class="empty">No auction started. Go to <strong>Setup</strong> to begin.</div>`;
    return;
  }

  const A = D.auc;

  // DONE
  if (A.done) {
    el.innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:44px;margin-bottom:10px">🏆</div>
        <div class="bebas" style="font-size:30px;color:var(--green);margin-bottom:8px">Auction Complete</div>
        <p style="color:var(--muted);margin-bottom:18px">${A.teams.reduce((s,t)=>s+t.players.length,0)} players across ${A.teams.length} teams</p>
        <div class="brow" style="justify-content:center">
          <button class="btn g" onclick="goScreen('squads')">View Squads</button>
          <button class="btn s aonly" onclick="exportJSON()">📤 Export JSON</button>
          <button class="btn s aonly" onclick="exportCSV()">📊 Export CSV</button>
        </div>
      </div>`;
    return;
  }

  const ph = A.phases[A.phaseIdx];
  const phLabel = ph === 'gk' ? 'GK Phase' : ph === 'icon' ? 'Icon Phase' : 'General Phase';

  // Phase bar
  let html = `<div class="card" style="padding:12px 14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
      <div class="bebas" style="font-size:19px">${A.inReauction ? 'Re-auction' : phLabel}</div>
      <div style="display:flex;gap:6px;align-items:center">
        ${isAdmin() && A.undoStack.length ? `<button class="btn s xs" onclick="doUndo()">↩ Undo</button>` : ''}
        <span style="font-size:11px;color:var(--muted)">${A.sold.filter(s=>s.type!=='skip').length} sold · ${A.queue.length} remain</span>
      </div>
    </div>
    <div class="phase-bar">
      ${A.phases.map((p,i) => `<span class="pseg ${i<A.phaseIdx?'done':i===A.phaseIdx?'on':''}">${p==='gk'?'🧤 GKs':p==='icon'?'⭐ Icons':'⚽ General'}</span>`).join('')}
    </div>
  </div>`;

  // ── SIMULTANEOUS MODE ──
  if (A.simState) {
    const sim = A.simState;

    if (sim.phase === 'pick') {
      html += `<div class="card">
        <div class="ct" style="color:var(--gold)">⚡ Simultaneous Icon Pick</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
          Each team secretly picks an icon player and a bid. All picks are revealed at once.
          If two teams pick the same player, they go to an open bidding war.
        </p>
        <div style="margin-bottom:10px">
          <strong style="font-size:12px">Available icons:</strong><br>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px">
            ${sim.pool.map(p => `<span class="badge bicon" style="font-size:11px;padding:3px 8px">${p.n} <span style="color:var(--muted)">${p.p}</span></span>`).join('')}
          </div>
        </div>
        <div class="sim-grid">
          ${sim.teams.map((t, i) => `<div class="sim-card">
            <div class="sim-tname">${t.name} <span style="font-weight:400;color:var(--muted);font-size:11px">${t.budget}c</span></div>
            <select id="sp-${i}" style="width:100%;margin-bottom:6px">
              <option value="">— pick icon —</option>
              ${sim.pool.map(p => `<option value="${p.id}">${p.n}</option>`).join('')}
            </select>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="number" id="sb-${i}" min="${floor('icon')}" max="${t.budget}" value="${floor('icon')}" style="width:75px">
              <span style="font-size:11px;color:var(--muted)">coins</span>
            </div>
          </div>`).join('')}
        </div>
        <div class="err" id="sim-err"></div>
        <div class="brow">
          <button class="btn go" onclick="simReveal()">🎭 Reveal all picks</button>
          ${A.undoStack.length ? `<button class="btn s sm" onclick="doUndo()">↩ Undo</button>` : ''}
        </div>
      </div>`;
      el.innerHTML = html; return;
    }

    if (sim.phase === 'resolve') {
      const conf = sim.conflicts[sim.conflictIdx];
      const conflictTeams = A.teams.filter(t => conf.bids.some(b => b.teamName === t.name));
      html += `<div class="ob ob-warn">
        <div class="ob-lbl">⚔️ Bidding War — ${conf.player.n}</div>
        <div class="ob-name">${conf.player.n}</div>
        <div class="ob-meta"><span>${conf.player.p}</span><span>Both teams picked this player</span></div>
      </div>
      <div class="card aonly">
        <div class="ct" style="margin-bottom:6px">Conflict ${sim.conflictIdx+1}/${sim.conflicts.length}: ${conf.bids.map(b=>b.teamName+' ('+b.bid+'c)').join(' vs ')}</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Open bidding — highest bid wins</p>
        <div class="frow">
          <span class="fl">Team</span>
          <select id="war-team" style="flex:1">
            ${conflictTeams.map((t,i) => `<option value="${A.teams.indexOf(t)}">${t.name} — ${t.budget}c</option>`).join('')}
          </select>
        </div>
        <div class="frow">
          <span class="fl">Bid</span>
          <input type="number" id="war-coins" min="1" value="${Math.max(...conf.bids.map(b=>b.bid))+1}" style="width:90px">
          <span class="hint">coins</span>
        </div>
        <div class="err" id="war-msg"></div>
        <div class="brow">
          <button class="btn g sm" onclick="simConflictBid()">Award to this team</button>
        </div>
      </div>`;
      el.innerHTML = html; return;
    }
  }

  // ── PHASE BOUNDARY (no current player, queue empty) ──
  if (!A.current) {
    if (!A.inReauction && A.phaseIdx < A.phases.length - 1) {
      const nextPh = A.phases[A.phaseIdx + 1];
      const nextLabel = nextPh === 'gk' ? 'GK Phase' : nextPh === 'icon' ? 'Icon Phase' : 'General Phase';
      html += `<div class="ob">
        <div class="ob-lbl">Phase Complete</div>
        <div class="ob-name" style="font-size:26px">${phLabel} Done</div>
        ${A.skipped.length ? `<div style="font-size:12px;color:var(--muted);margin-top:6px">${A.skipped.length} player(s) skipped — will be re-auctioned at the end</div>` : ''}
      </div>
      <div class="card aonly" style="text-align:center">
        <button class="btn g" onclick="advancePhase()">Start ${nextLabel} →</button>
      </div>`;
    } else if (!A.inReauction) {
      // All phases done — check for skipped
      if (A.skipped.length) {
        html += `<div class="ob">
          <div class="ob-lbl">All Phases Complete</div>
          <div class="ob-name" style="font-size:26px">${A.skipped.length} Player${A.skipped.length>1?'s':''} to Re-auction</div>
        </div>
        <div class="card aonly" style="text-align:center">
          <button class="btn g" onclick="startReauction()">Start Re-auction →</button>
        </div>`;
      } else {
        html += `<div class="card aonly" style="text-align:center">
          <button class="btn g" onclick="endAuction()">✓ Finish Auction</button>
        </div>`;
      }
    } else {
      // Re-auction done
      html += `<div class="card aonly" style="text-align:center">
        <button class="btn g" onclick="endAuction()">✓ Finish Auction</button>
      </div>`;
    }

    // Show current squads summary
    html += renderSquadMini();
    el.innerHTML = html;
    return;
  }

  // ── CURRENT PLAYER ──
  const isIcon = D.iconIds.includes(A.current.id);
  const isCap  = D.capIds.includes(A.current.id);
  html += `<div class="ob">
    <div class="ob-lbl">${A.inReauction ? 'Re-auction' : phLabel}</div>
    <div class="ob-name">${A.current.n}</div>
    <div class="ob-meta">
      <span>${A.current.p}</span>
      ${A.current.gk ? '<span class="badge bgk">GK</span>' : ''}
      ${isIcon ? '<span class="badge bicon">Icon</span>' : ''}
      ${A.skipped.length ? `<span style="color:var(--muted)">${A.skipped.length} skipped</span>` : ''}
    </div>
  </div>`;

  // Bid panel (admin only)
  if (isAdmin()) {
    const fl = floor(ph);
    html += `<div class="card aonly">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">
        ${fl > 1 ? `Minimum bid: <strong>${fl} coins</strong> · ` : ''}Assign to team:
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="bid-team" style="flex:2;min-width:140px">
          ${A.teams.map((t, i) => {
            const gkLocked   = ph === 'gk' && t.hasGK && !A.inReauction;
            const iconLocked  = ph === 'icon' && D.cfg.oneIconPerTeam && t.players.some(p=>p.type==='icon') && !A.inReauction;
            const full        = t.players.length >= D.cfg.squadSize;
            const dis = gkLocked || iconLocked || full;
            const note = full ? ' (full)' : gkLocked ? ' (has GK)' : iconLocked ? ' (has icon)' : ` — ${t.budget}c`;
            return `<option value="${i}" ${dis?'disabled':''}>${t.name}${note}</option>`;
          }).join('')}
        </select>
        <input type="number" id="bid-coins" min="${fl}" value="${fl}" style="width:85px;text-align:center">
        <button class="btn g sm" onclick="doBid()">Sell</button>
        <button class="btn s sm" onclick="doSkip()">Skip</button>
      </div>
      <div class="err" id="bid-msg"></div>
    </div>`;
  }

  // Queue preview
  if (A.queue.length) {
    html += `<div style="font-size:11px;color:var(--muted);margin-top:8px">
      Next: ${A.queue.slice(0,5).map(p=>p.n).join(', ')}${A.queue.length>5?' +'+(A.queue.length-5)+' more':''}
    </div>`;
  }

  el.innerHTML = html;
}

function renderSquadMini() {
  const A = D.auc;
  return `<div class="card" style="margin-top:10px">
    <div class="ct">Squads</div>
    <div class="sq-grid">
      ${A.teams.map(t => `<div class="sq-card">
        <div class="sq-hdr"><span class="sq-name">${t.name}</span><span class="sq-budget">${t.budget}c left</span></div>
        ${t.players.map(p => `<div class="sq-row">
          ${p.cap?'<span class="badge bcap">C</span>':''}
          <span class="sq-player">${p.n}</span>
          <span class="sq-pos">${p.p}</span>
        </div>`).join('')}
        ${t.players.length<D.cfg.squadSize?`<div style="padding:4px 13px;font-size:11px;color:var(--red)">${D.cfg.squadSize-t.players.length} spot(s) left</div>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}

// ── SQUADS SCREEN ──
function renderSquads() {
  const el = document.getElementById('squads-wrap');
  if (!D.auc) { el.innerHTML = `<div class="empty">No auction data</div>`; return; }
  const A = D.auc;
  const sp = D.cfg.showPrices && isAdmin();

  let html = '';
  if (A.done && isAdmin()) {
    html += `<div class="green-banner">
      <div><strong>Auction complete</strong><br><span style="font-size:12px;color:var(--muted)">Export squads to use in the Tournament app</span></div>
      <div class="brow">
        <button class="btn g sm" onclick="exportJSON()">📤 Export JSON</button>
        <button class="btn s sm" onclick="exportCSV()">📊 Export CSV</button>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:10px">
      <label style="font-size:12px;display:flex;align-items:center;gap:5px;cursor:pointer">
        <input type="checkbox" ${sp?'checked':''} onchange="D.cfg.showPrices=this.checked;save();renderSquads()"> Show prices
      </label>
    </div>`;
  }

  html += `<div class="sq-grid">`;
  A.teams.forEach((t, ti) => {
    const ordered = [
      ...t.players.filter(p => p.cap),
      ...t.players.filter(p => !p.cap && p.gk),
      ...t.players.filter(p => !p.cap && !p.gk)
    ];
    html += `<div class="sq-card">
      <div class="sq-hdr">
        <div>
          <div class="sq-name">${t.name}</div>
          <div style="font-size:10px;color:var(--muted)">${t.players.length}/${D.cfg.squadSize} players${sp?` · ${t.budget}c left`:''}</div>
        </div>
        ${isAdmin() ? `<button class="btn s xs" onclick="openRename(${ti})">✏️</button>` : ''}
      </div>
      ${ordered.map(p => {
        const isGK = p.gk;
        const badgeType = isGK ? 'bgk' : p.type === 'icon' ? 'bicon' : p.cap ? 'bcap' : '';
        const badgeLbl  = isGK ? 'GK' : p.type === 'icon' ? 'Icon' : p.cap ? 'Cap' : '';
        return `<div class="sq-row">
          ${p.cap ? '<span class="badge bcap">C</span>' : ''}
          <span class="sq-player">${p.n}</span>
          <span class="sq-pos">${p.p}</span>
          ${badgeLbl ? `<span class="badge ${badgeType}">${badgeLbl}</span>` : ''}
          ${sp && p.price ? `<span class="sq-price">${p.price}c</span>` : ''}
        </div>`;
      }).join('')}
      ${t.players.length < D.cfg.squadSize ? `<div style="padding:5px 13px;font-size:11px;color:var(--red)">${D.cfg.squadSize-t.players.length} spot(s) unfilled</div>` : ''}
    </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

let renameIdx = -1;
function openRename(ti) {
  renameIdx = ti;
  document.getElementById('rename-inp').value = D.auc.teams[ti].name;
  document.getElementById('rename-err').textContent = '';
  document.getElementById('m-rename').classList.add('open');
}
function doRename() {
  const v = document.getElementById('rename-inp').value.trim();
  if (!v) { document.getElementById('rename-err').textContent = 'Name required'; return; }
  D.auc.teams[renameIdx].name = v;
  document.getElementById('m-rename').classList.remove('open');
  save(); renderSquads();
}

// ── LOG ──
function renderLog() {
  const el = document.getElementById('log-wrap');
  if (!D.auc || !D.auc.sold.length) { el.innerHTML = `<div class="empty">No entries yet</div>`; return; }
  el.innerHTML = `<div class="card">
    <div class="ct">Auction Log</div>
    ${[...D.auc.sold].reverse().map(e => `<div class="log-row">
      <span style="flex:1;font-weight:500">${e.player}</span>
      <span style="color:var(--muted)">${e.team || '—'}</span>
      <span style="color:var(--gold)">${e.price ? e.price+'c' : '—'}</span>
      <span style="font-size:10px;background:var(--bg3);padding:1px 6px;border-radius:4px;color:var(--muted)">${e.type}</span>
    </div>`).join('')}
  </div>`;
}

// ── SETTINGS ──
function renderSettings() {
  const el = document.getElementById('settings-wrap');
  el.innerHTML = `
    <div class="card">
      <div class="ct">PIN Settings</div>
      <div class="frow"><span class="fl">Admin PIN</span><input type="password" id="s-ap" maxlength="6" placeholder="new PIN (4-6 digits)" style="width:160px"></div>
      <div class="frow"><span class="fl">Viewer PIN</span><input type="password" id="s-vp" maxlength="6" placeholder="leave blank to disable" style="width:160px"></div>
      <div class="err" id="s-err"></div>
      <div class="brow"><button class="btn g sm" onclick="savePins()">Save PINs</button></div>
    </div>
    <div class="card">
      <div class="ct" style="color:var(--red)">Danger</div>
      <button class="btn d sm" onclick="if(confirm('Delete ALL auction data? Cannot be undone.')){localStorage.removeItem(KEY);location.reload()}">🗑 Delete all data</button>
    </div>`;
}
function savePins() {
  const a = document.getElementById('s-ap').value.trim();
  const v = document.getElementById('s-vp').value.trim();
  const err = document.getElementById('s-err');
  if (a && !/^\d{4,6}$/.test(a)) { err.textContent='Admin PIN must be 4–6 digits'; return; }
  if (v && !/^\d{4,6}$/.test(v)) { err.textContent='Viewer PIN must be 4–6 digits'; return; }
  if (a) D.cfg.adminPin = a;
  D.cfg.viewerPin = v;
  err.textContent = '';
  save();
  err.style.color = 'var(--green)';
  err.textContent = '✓ Saved';
  setTimeout(() => { err.textContent=''; err.style.color='var(--red)'; }, 2000);
}

// ── EXPORT ──
function exportJSON() {
  const squads = D.auc.teams.map(t => ({
    name: t.name,
    players: t.players.map(p => ({
      name: p.n, pos: p.p, isGK: p.gk, isCap: !!p.cap,
      type: p.type, price: p.price || 0
    }))
  }));
  dl(JSON.stringify({tournName: D.cfg.tournName, squads, exportedAt: Date.now()}, null, 2),
    clean(D.cfg.tournName) + '_squads.json', 'application/json');
}
function exportCSV() {
  const sp = D.cfg.showPrices;
  const rows = [['Team','Player','Position','Role',...(sp?['Price']:[])]];
  D.auc.teams.forEach(t => {
    const ord = [...t.players.filter(p=>p.cap),...t.players.filter(p=>!p.cap&&p.gk),...t.players.filter(p=>!p.cap&&!p.gk)];
    ord.forEach(p => {
      const role = p.gk?'GK':p.type==='icon'?'Icon':p.cap?'Captain':'Player';
      rows.push([t.name, p.n, p.p, role, ...(sp?[p.price||0]:[])]);
    });
    rows.push(['','','','',...(sp?['']:[])]);
  });
  dl('\uFEFF'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n'),
    clean(D.cfg.tournName)+'_squads.csv','text/csv');
}
function dl(content, name, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name; a.click();
}
function clean(s) { return (s||'PSA').replace(/\s+/g,'_'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  load();
  document.getElementById('pinp').focus();
});
</script>
</body>
